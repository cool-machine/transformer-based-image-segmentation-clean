name: Deploy Azure Functions API

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './backend'
  PYTHON_VERSION: '3.12'
  PUBLISH_PROFILE_PRIMARY: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_OCP8_CENTRALUS_V2 }}
  PUBLISH_PROFILE_FALLBACK: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
  AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Resolve Project Dependencies Using Pip'
      shell: bash
      run: |
        pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"
        popd

    - name: Validate Azure deployment auth
      shell: bash
      run: |
        if [ -z "${{ env.PUBLISH_PROFILE_PRIMARY }}" ] && \
           [ -z "${{ env.PUBLISH_PROFILE_FALLBACK }}" ] && \
           [ -z "${{ env.AZURE_CREDENTIALS_JSON }}" ]; then
          echo "No Azure deployment credentials configured."
          echo "Set one of:"
          echo " - AZUREAPPSERVICE_PUBLISHPROFILE_OCP8_CENTRALUS_V2 (preferred)"
          echo " - AZURE_FUNCTIONAPP_PUBLISH_PROFILE"
          echo " - AZURE_CREDENTIALS (for azure/login RBAC)"
          exit 1
        fi

    - name: Azure Login (RBAC fallback)
      if: ${{ env.PUBLISH_PROFILE_PRIMARY == '' && env.PUBLISH_PROFILE_FALLBACK == '' && env.AZURE_CREDENTIALS_JSON != '' }}
      uses: azure/login@v2
      with:
        creds: ${{ env.AZURE_CREDENTIALS_JSON }}

    - name: 'Run Azure Functions Action'
      uses: Azure/functions-action@v1
      id: fa
      with:
        app-name: 'ocp8-centralus-v2'
        slot-name: 'Production'
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        publish-profile: ${{ env.PUBLISH_PROFILE_PRIMARY || env.PUBLISH_PROFILE_FALLBACK }}